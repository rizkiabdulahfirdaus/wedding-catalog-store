<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Bliss - Preview</title>
    <link rel="stylesheet" href="../../assets/css/preview.css">
    <style>
        .royal-background {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            position: relative;
        }
        .royal-background::before {
            content: '✨';
            font-size: 8rem;
            position: absolute;
            opacity: 0.1;
            top: -2rem;
            right: 2rem;
        }
        .royal-background::after {
            content: '👑';
            font-size: 6rem;
            position: absolute;
            opacity: 0.1;
            top: 1rem;
            left: 1rem;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="template-preview">
            <div class="preview-content royal-background" style="color: white;">
                <h1 style="font-size: 3.5rem; letter-spacing: 4px; font-weight: 300;">John & Mary</h1>
                <p style="font-size: 1.1rem; letter-spacing: 2px; margin: 2rem 0; color: #ffd89b;">ARE PLEASED TO ANNOUNCE</p>
                <p style="font-size: 1.3rem; margin: 1rem 0;">The celebration of their wedding</p>
                <p style="font-size: 1.2rem; margin-top: 2rem;">Saturday, the fifteenth of June</p>
                <p>Two thousand twenty-four</p>
                <p style="margin-top: 2rem; color: #ffd89b;">Grand Ballroom</p>
            </div>
            <div class="preview-footer">
                <p>This is a preview of the Royal Bliss template - Premium tier</p>
            </div>
        </div>
    </div>
</body>
</html>
