<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Wedding Catalog Store</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/checkout.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">💍 Wedding Catalog Store</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="katalog.html">Catalog</a>
                <a href="cart.html">Cart <span class="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Checkout</h1>
        
        <div class="checkout-wrapper">
            <div class="checkout-form">
                <h2>Billing Information</h2>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Address *</label>
                        <input type="text" id="address" name="address" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="country">Country *</label>
                            <input type="text" id="country" name="country" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="specialRequests">Special Requests</label>
                        <textarea id="specialRequests" name="specialRequests" rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Complete Order</button>
                </form>
            </div>

            <div class="order-summary">
                <h2>Order Summary</h2>
                <div id="orderItems"></div>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="summarySubtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="summaryTax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="summaryTotal">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/checkout.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
