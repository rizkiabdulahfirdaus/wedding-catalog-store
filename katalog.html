<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - Wedding Templates</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/katalog.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">💍 Wedding Catalog Store</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="katalog.html" class="active">Catalog</a>
                <a href="cart.html">Cart <span class="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Browse Our Templates</h1>
        
        <div class="category-filter">
            <button class="filter-btn active" data-filter="all">All Templates</button>
            <button class="filter-btn" data-filter="basic">Basic ($10)</button>
            <button class="filter-btn" data-filter="medium">Medium ($15)</button>
            <button class="filter-btn" data-filter="premium">Premium ($20)</button>
        </div>

        <div class="templates-grid" id="templatesGrid">
            <!-- Templates loaded by JavaScript -->
        </div>
    </div>

    <!-- Modal for preview -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="previewFrame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="assets/js/products.js"></script>
    <script src="assets/js/katalog.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
